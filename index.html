<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In - Coin Flip</title>
<style>
  :root {
    --gold: #ffd700;
    --blue: #4285f4;
    --blue-dark: #3367d6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: #fff;
  }

  .login-card {
    position: relative;
    width: 100%;
    max-width: 400px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 24px;
    padding: 40px 32px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(10px);
    text-align: center;
  }

  .login-icon {
    font-size: 3rem;
    margin-bottom: 6px;
  }

  h1 {
    font-size: 2.2rem;
    letter-spacing: 3px;
    margin-bottom: 6px;
    background: linear-gradient(90deg, #ffd700, #fff8dc, #ffd700);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 2px 20px rgba(255, 215, 0, 0.25);
  }

  .subtitle {
    color: rgba(255, 255, 255, 0.5);
    font-size: 0.95rem;
    margin-bottom: 28px;
  }

  .field {
    text-align: left;
    margin-bottom: 18px;
  }

  .field label {
    display: block;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.45);
    margin-bottom: 6px;
  }

  .field input {
    width: 100%;
    padding: 13px 16px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.15);
    background: rgba(255, 255, 255, 0.06);
    color: #fff;
    font-size: 1rem;
    font-family: inherit;
    transition: border-color 0.2s, background 0.2s;
  }

  .field input:focus {
    outline: none;
    border-color: var(--gold);
    background: rgba(255, 255, 255, 0.1);
  }

  .login-error {
    color: #ff8080;
    font-size: 0.85rem;
    min-height: 18px;
    margin-bottom: 14px;
    text-align: left;
  }

  .btn-primary {
    width: 100%;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 15px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(145deg, #ffd700, #d4a017);
    color: #3b2a00;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(255, 215, 0, 0.35), 0 2px 0 #8a6300 inset;
    transition: transform 0.15s, box-shadow 0.15s;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(255, 215, 0, 0.5), 0 2px 0 #8a6300 inset;
  }
  .btn-primary:active { transform: translateY(1px); }

  .hint-box {
    margin-top: 24px;
    padding: 12px 16px;
    border-radius: 12px;
    background: rgba(255, 215, 0, 0.08);
    border: 1px solid rgba(255, 215, 0, 0.2);
    font-size: 0.8rem;
    color: rgba(255, 255, 255, 0.6);
    line-height: 1.6;
  }
  .hint-box b { color: var(--gold); }

  .success-icon {
    font-size: 3.5rem;
    margin-bottom: 10px;
    animation: pop-in 0.4s ease;
  }

  @keyframes pop-in {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  /* ---------- Modal overlay ---------- */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.65);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.25s ease;
    z-index: 100;
  }

  .modal-overlay.active {
    opacity: 1;
    visibility: visible;
  }

  .captcha-box {
    background: #fff;
    color: #1a1a2e;
    border-radius: 8px;
    width: 320px;
    max-width: 100%;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
    animation: modal-in 0.3s ease;
    overflow: hidden;
  }

  .captcha-box.wide { width: 360px; }

  @keyframes modal-in {
    from { transform: scale(0.92) translateY(12px); opacity: 0; }
    to   { transform: scale(1) translateY(0); opacity: 1; }
  }

  /* ---------- "I'm not a robot" check ---------- */
  .robot-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 16px;
    padding: 16px 18px;
    border: 1px solid #d3d3d3;
    border-radius: 6px;
    background: #f9f9f9;
  }

  .robot-checkbox-wrap {
    position: relative;
    width: 28px;
    height: 28px;
    flex-shrink: 0;
    display: block;
    cursor: pointer;
  }

  .robot-checkbox-wrap input {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    margin: 0;
    opacity: 0;
    cursor: pointer;
    z-index: 2;
  }

  .robot-checkbox-box {
    position: absolute;
    inset: 0;
    border: 2px solid #c1c1c1;
    border-radius: 3px;
    background: #fff;
    transition: border-color 0.2s;
  }

  .robot-spinner,
  .robot-checkmark {
    display: none;
    width: 28px;
    height: 28px;
    flex-shrink: 0;
    align-items: center;
    justify-content: center;
  }

  .robot-spinner {
    border: 3px solid #d3d3d3;
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .robot-checkmark {
    color: #34a853;
    font-size: 1.6rem;
    font-weight: 900;
  }

  .robot-row.verifying .robot-checkbox-wrap { display: none; }
  .robot-row.verifying .robot-spinner { display: flex; }

  .robot-row.verified .robot-checkbox-wrap,
  .robot-row.verified .robot-spinner { display: none; }
  .robot-row.verified .robot-checkmark { display: flex; }

  .robot-label {
    flex: 1;
    text-align: left;
    font-size: 1.05rem;
  }

  .robot-logo {
    text-align: center;
    font-size: 0.6rem;
    line-height: 1.3;
    color: #999;
  }
  .robot-logo-icon { font-size: 1.7rem; }

  .captcha-footer {
    font-size: 0.7rem;
    color: #999;
    text-align: right;
    padding: 0 20px 14px;
  }

  /* ---------- Star image captcha ---------- */
  .captcha-header {
    background: var(--blue);
    color: #fff;
    padding: 14px 18px;
  }
  .captcha-header h3 {
    font-size: 1.05rem;
    font-weight: 500;
  }
  .captcha-header p {
    font-size: 0.8rem;
    opacity: 0.9;
    margin-top: 2px;
  }

  .image-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 4px;
    padding: 4px;
    background: #fff;
  }

  .img-cell {
    aspect-ratio: 1;
    background: #eef0f3;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.6rem;
    cursor: pointer;
    position: relative;
    user-select: none;
  }
  .img-cell:hover { filter: brightness(0.96); }

  .img-cell.selected {
    box-shadow: inset 0 0 0 3px var(--blue);
  }

  .img-cell.selected::after {
    content: '\2713';
    position: absolute;
    top: 6px;
    left: 6px;
    width: 22px;
    height: 22px;
    background: var(--blue);
    color: #fff;
    border-radius: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    font-weight: 700;
  }

  .star-error {
    color: #d93025;
    font-size: 0.8rem;
    text-align: center;
    min-height: 18px;
    padding: 8px 16px 0;
  }

  .captcha-actions {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-top: 1px solid #eee;
  }

  .btn-text {
    background: none;
    border: none;
    color: var(--blue);
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-text:hover { text-decoration: underline; }

  .btn-verify {
    background: var(--blue);
    color: #fff;
    border: none;
    padding: 10px 28px;
    border-radius: 4px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-verify:hover { background: var(--blue-dark); }

  @media (max-width: 360px) {
    .login-card { padding: 32px 22px; }
    h1 { font-size: 1.8rem; }
    .captcha-box, .captcha-box.wide { width: 100%; }
  }
</style>
</head>
<body>
  <div class="login-card" id="loginCard">
    <div class="login-icon">&#129689;</div>
    <h1>Coin Flip</h1>
    <p class="subtitle">Sign in to continue</p>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" autocapitalize="off" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <div class="login-error" id="loginError"></div>
      <button type="submit" class="btn-primary">Sign In</button>
    </form>

    <div class="hint-box">
      Demo credentials &mdash; Username: <b>Coin_Flipper</b> &middot; Password: <b>FLIP!</b>
    </div>
  </div>

  <!-- "I'm not a robot" check -->
  <div class="modal-overlay" id="robotOverlay">
    <div class="captcha-box">
      <div class="robot-row" id="robotRow">
        <label class="robot-checkbox-wrap">
          <input type="checkbox" id="robotCheckbox" aria-label="I'm not a robot">
          <span class="robot-checkbox-box"></span>
        </label>
        <div class="robot-spinner"></div>
        <div class="robot-checkmark">&#10003;</div>
        <span class="robot-label">I'm not a robot</span>
        <div class="robot-logo">
          <div class="robot-logo-icon">&#128737;</div>
          <div>Security<br>Check</div>
        </div>
      </div>
      <div class="captcha-footer">Privacy - Terms</div>
    </div>
  </div>

  <!-- Star image captcha -->
  <div class="modal-overlay" id="starOverlay">
    <div class="captcha-box wide">
      <div class="captcha-header">
        <h3>Select all squares with stars &#11088;</h3>
        <p>Click Verify once you've selected them all.</p>
      </div>
      <div class="image-grid" id="imageGrid"></div>
      <div class="star-error" id="starError"></div>
      <div class="captcha-actions">
        <button class="btn-text" id="reloadGrid" type="button">&#8635; New images</button>
        <button class="btn-verify" id="verifyStars" type="button">Verify</button>
      </div>
    </div>
  </div>

  <script>
    const CORRECT_USERNAME = 'Coin_Flipper';
    const CORRECT_PASSWORD = 'FLIP!';
    const STAR = '⭐';
    const OTHER_SHAPES = ['❤️', '\u{1F535}', '\u{1F7E2}', '\u{1F7E0}', '\u{1F7E3}', '\u{1F536}', '\u{1F53A}', '\u{1F319}', '⬛'];

    const loginCard = document.getElementById('loginCard');
    const loginForm = document.getElementById('loginForm');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const loginError = document.getElementById('loginError');

    const robotOverlay = document.getElementById('robotOverlay');
    const robotRow = document.getElementById('robotRow');
    const robotCheckbox = document.getElementById('robotCheckbox');

    const starOverlay = document.getElementById('starOverlay');
    const imageGrid = document.getElementById('imageGrid');
    const starError = document.getElementById('starError');
    const verifyStarsBtn = document.getElementById('verifyStars');
    const reloadGridBtn = document.getElementById('reloadGrid');

    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      if (usernameInput.value.trim() === CORRECT_USERNAME && passwordInput.value === CORRECT_PASSWORD) {
        loginError.textContent = '';
        robotOverlay.classList.add('active');
      } else {
        loginError.textContent = 'Incorrect username or password.';
      }
    });

    robotCheckbox.addEventListener('change', () => {
      if (!robotCheckbox.checked) return;
      robotRow.classList.add('verifying');
      setTimeout(() => {
        robotRow.classList.remove('verifying');
        robotRow.classList.add('verified');
        setTimeout(() => {
          robotOverlay.classList.remove('active');
          generateStarGrid();
          starOverlay.classList.add('active');
        }, 700);
      }, 900);
    });

    function generateStarGrid() {
      starError.textContent = '';

      const total = 9;
      const starCount = 2 + Math.floor(Math.random() * 3); // 2-4 stars
      const cells = [];
      for (let i = 0; i < starCount; i++) cells.push(STAR);
      while (cells.length < total) {
        cells.push(OTHER_SHAPES[Math.floor(Math.random() * OTHER_SHAPES.length)]);
      }
      // shuffle
      for (let i = cells.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [cells[i], cells[j]] = [cells[j], cells[i]];
      }

      imageGrid.innerHTML = cells.map((shape) =>
        `<div class="img-cell" data-star="${shape === STAR}" tabindex="0" role="checkbox" aria-checked="false"><span>${shape}</span></div>`
      ).join('');

      imageGrid.querySelectorAll('.img-cell').forEach((cell) => {
        const toggle = () => {
          cell.classList.toggle('selected');
          cell.setAttribute('aria-checked', cell.classList.contains('selected'));
        };
        cell.addEventListener('click', toggle);
        cell.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            toggle();
          }
        });
      });
    }

    verifyStarsBtn.addEventListener('click', () => {
      const cells = imageGrid.querySelectorAll('.img-cell');
      let correct = true;
      cells.forEach((cell) => {
        const isStar = cell.dataset.star === 'true';
        const isSelected = cell.classList.contains('selected');
        if (isStar !== isSelected) correct = false;
      });

      if (correct) {
        sessionStorage.setItem('cf_authenticated', 'true');
        starOverlay.classList.remove('active');
        showSuccess();
      } else {
        generateStarGrid();
        starError.textContent = 'Please try again.';
      }
    });

    reloadGridBtn.addEventListener('click', generateStarGrid);

    function showSuccess() {
      loginCard.innerHTML = `
        <div class="success-icon">&#9989;</div>
        <h1>Access Granted</h1>
        <p class="subtitle">Redirecting to Coin Flip...</p>
      `;
      setTimeout(() => {
        window.location.href = 'coinflip.html';
      }, 1200);
    }
  </script>
</body>
</html>
